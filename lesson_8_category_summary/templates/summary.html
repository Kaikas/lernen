<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Summary</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
            background: #f5f5f5;
        }

        h1, h2 {
            color: #222;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .count {
            font-size: 32px;
            font-weight: bold;
            color: #0b6efd;
        }

        a.button-link {
            display: inline-block;
            margin-top: 14px;
            padding: 10px 14px;
            border-radius: 6px;
            background: #0b6efd;
            color: white;
            text-decoration: none;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <h1>Category Summary</h1>
    <p>This page shows how many notes belong to each category.</p>

    <a class="button-link" href="{{ url_for('index') }}">Back to Notes</a>

    <div class="summary-grid">
        {% for row in summary_rows %}
            <div class="card">
                <h2>{{ row["name"] }}</h2>
                <p class="count">{{ row["note_count"] }}</p>
                <p>saved note(s)</p>
            </div>
        {% endfor %}
    </div>
</body>
</html>
