<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Syntax Notes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
            background: #f5f5f5;
        }

        h1, h2 {
            color: #222;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            min-height: 90px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            resize: vertical;
        }

        button {
            margin-top: 14px;
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #0b6efd;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        button.delete {
            background: #c0392b;
        }

        pre {
            background: #f0f3f7;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Python Syntax Notes</h1>
    <p>Lesson 1 is the clean base app.</p>

    <div class="card">
        <h2>Create Note</h2>
        <form action="{{ url_for('create_note') }}" method="post">
            <label for="syntax">Python Syntax</label>
            <textarea id="syntax" name="syntax" placeholder="e.g. for i in range(5):" required></textarea>

            <label for="explanation">What does it do?</label>
            <textarea id="explanation" name="explanation" placeholder="e.g. Runs a loop 5 times." required></textarea>

            <button type="submit">Create Note</button>
        </form>
    </div>

    <div class="card">
        <h2>Saved Notes</h2>

        {% if notes %}
            {% for note in notes %}
                <div class="card">
                    <h3>Syntax</h3>
                    <pre>{{ note["syntax"] }}</pre>

                    <h3>Explanation</h3>
                    <p>{{ note["explanation"] }}</p>

                    <form action="{{ url_for('delete_note', note_id=note['id']) }}" method="post">
                        <button class="delete" type="submit">Delete</button>
                    </form>
                </div>
            {% endfor %}
        {% else %}
            <p>No notes saved yet.</p>
        {% endif %}
    </div>
</body>
</html>
